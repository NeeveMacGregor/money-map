.chk:hover{border-color:var(--td)}
.chk.on{background:var(--grn);color:#000;border-color:var(--grn)}

input[type=number]{font-family:'Sora',sans-serif;font-size:16px}
input:focus{border-color:var(--td)}
.btn-add{padding:12px 22px;border-radius:12px;border:none;background:var(--org);color:#000;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.3px;transition:opacity .15s}
.btn-add:active{opacity:.8}
.btn-del{width:26px;height:26px;border-radius:8px;border:1px solid var(--cb);background:transparent;color:var(--tm);font-size:14px;cursor:pointer;transition:border-color .15s}
.btn-del:hover{border-color:var(--red);color:var(--red)}
.hidden{display:none}
.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;font-size:14px;color:var(--td);font-family:'Sora',sans-serif;font-style:italic}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:8px}
.sync-dot.ok{background:var(--grn)}.sync-dot.err{background:var(--red)}.sync-dot.load{background:var(--yel)}

function fm(n){return(n<0?"-":"")+"$"+Math.abs(Math.round(n)).toLocaleString();}
function fd(n){return "$"+n.toFixed(2);}

function api(params, cb) {
  if (SCRIPT_URL === "YOUR_APPS_SCRIPT_URL_HERE") {
    if (cb) cb();
    return;
  }
  var url = SCRIPT_URL + "?" + Object.keys(params).map(function(k){return k+"="+encodeURIComponent(params[k]);}).join("&");
  fetch(url).then(function(r){return r.json();}).then(function(d){if(cb)cb(d);}).catch(function(e){console.error(e);setSyncStatus("err");});
}

function setSyncStatus(s) {
  var el = document.getElementById("syncStatus");
  if (!el) return;
  if (s === "ok") el.innerHTML = '<span class="sync-dot ok"></span>';
  else if (s === "err") el.innerHTML = '<span class="sync-dot err"></span>';
  else if (s === "load") el.innerHTML = '<span class="sync-dot load"></span>';
  else el.innerHTML = '';
}

}

function getPaidCount(lid, total) {
  var c = 0;
  for (var m = 1; m <= total; m++) { if (state.paidMap[lid+"-"+m]) c++; }

}

function getFiltered() {
  var f = state.platF === "All" ? loans.slice() : loans.filter(function(l){return l.p===state.platF;});
  if (state.sortBy==="date") f.sort(function(a,b){return a.day-b.day;});

  else if (state.sortBy==="pmt") f.sort(function(a,b){return b.pmt-a.pmt;});
  else if (state.sortBy==="owed") f.sort(function(a,b){return a.rem-b.rem;});
  return f;
}

function bar(v, max, color, height) {

  return '<div class="bar-wrap" style="height:'+h+'px"><div class="bar-fill" style="width:'+pct+'%;background:'+color+';height:'+h+'px"></div></div>';
}

function card(content, extra) {
  var cls = "card";

    if (extra.bg) sty += "background:"+extra.bg+";";
    if (extra.border) sty += "border-color:"+extra.border+";";
  }
  return '<div class="'+cls+'" style="'+sty+'">'+content+'</div>';
}

  // Overview
  var totIn=0;var totOut=0;
  mExp.forEach(function(e){if(e.amt<0)totIn+=Math.abs(e.amt);else totOut+=e.amt;});
  var netSpent=totOut-totIn;
  var overCol=netSpent>totalFlexBudget?'var(--red)':'var(--org)';
  var barCol=netSpent>totalFlexBudget?'var(--red)':'var(--grn)';
  var remCol=netSpent>totalFlexBudget?'var(--red)':'var(--grn)';
  var remTxt=netSpent>totalFlexBudget?fm(netSpent-totalFlexBudget)+' over':fm(totalFlexBudget-netSpent)+' left';
  var overviewInner='<div style="display:flex;justify-content:space-between;margin-bottom:8px"><div><div style="font-size:11px;color:var(--td);text-transform:uppercase">Net Spent</div><div class="mono" style="font-size:24px;font-weight:700;color:'+overCol+'">'+fm(Math.max(0,netSpent))+'</div></div><div style="text-align:right"><div style="font-size:11px;color:var(--td);text-transform:uppercase">Budget</div><div class="mono" style="font-size:24px;font-weight:700">'+fm(totalFlexBudget)+'</div></div></div>';
  overviewInner+=bar(Math.max(0,netSpent),totalFlexBudget,barCol,12);
  overviewInner+='<div style="font-size:12px;color:'+remCol+';margin-top:6px;text-align:center;font-weight:600">'+remTxt+'</div>';
  if(totIn>0){overviewInner+='<div style="display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--cb);font-size:12px"><span style="color:var(--td)">Spent '+fm(totOut)+' - Income '+fm(totIn)+'</span><span style="color:var(--grn);font-weight:600">= '+fm(netSpent)+'</span></div>';}
  h+=card(overviewInner,{glow:true});

  // Categories
  var ch=hdr('📊','By Category','');
  flexCats.forEach(function(cat){
    var sp=catSpent(cat.id);
    if(cat.budget > 0){
      var ov=sp>cat.budget;var pc=Math.round(sp/cat.budget*100);
      var bCol=ov?'var(--red)':pc>80?'var(--yel)':'var(--grn)';
      ch+='<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:13px;font-weight:600">'+cat.name+'</span><span class="mono" style="font-size:13px;font-weight:700;color:'+(ov?'var(--red)':'var(--tx)')+'">'+fm(sp)+' <span style="color:var(--tm);font-weight:400">/ '+fm(cat.budget)+'</span></span></div>'+bar(sp,cat.budget,bCol,6);
      if(ov) ch+='<div style="font-size:10px;color:var(--red);margin-top:2px">'+fm(sp-cat.budget)+' over</div>';
      ch+='</div>';
    } else if(sp > 0) {
      ch+='<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:13px;font-weight:600">'+cat.name+'</span><span class="mono" style="font-size:13px;font-weight:700;color:var(--td)">'+fm(sp)+' <span style="color:var(--tm);font-weight:400">tracking</span></span></div></div>';
    }
  });
  h+=card(ch);

  // Add expense form
  var isIncome = state.expType === "income";
  var fh=hdr(isIncome?'💸':'➕', isIncome?'Log Income':'Log Expense','');
  fh+='<div style="display:flex;gap:6px;margin-bottom:10px"><button class="pill'+(isIncome?'':' on')+'" onclick="state.expType=\'expense\';render()">Expense</button><button style="padding:5px 12px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;border:1px solid '+(isIncome?'var(--grn)':'var(--cb)')+';background:'+(isIncome?'var(--grn)':'transparent')+';color:'+(isIncome?'#000':'var(--td)')+'" onclick="state.expType=\'income\';render()">Income</button></div>';
  fh+='<div style="display:flex;gap:8px;margin-bottom:10px"><input type="number" inputmode="decimal" placeholder="Amount" id="expAmt" value="'+state.expAmt+'" oninput="state.expAmt=this.value" style="flex:1"><button style="padding:10px 20px;border-radius:10px;border:none;background:'+(isIncome?'var(--grn)':'var(--org)')+';color:#000;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit" onclick="addExpense()">Add</button></div>';
  fh+='<input type="text" placeholder="'+(isIncome?'From who/what?':'What? (optional)')+'" id="expNote" value="'+(state.expNote||'')+'" oninput="state.expNote=this.value" style="margin-bottom:10px">';
  if(!isIncome){
    fh+='<div style="display:flex;gap:6px;flex-wrap:wrap">';
    flexCats.forEach(function(cat){
      var on=state.expCat===cat.id;
      fh+='<button class="pill'+(on?' on':'')+'" onclick="state.expCat=\''+cat.id+'\';render()">'+cat.name+'</button>';
    });
    fh+='</div>';
  } else {
    fh+='<div style="display:flex;gap:6px;flex-wrap:wrap">';
    incomeCats.forEach(function(cat){
      var on=state.incCat===cat.id;
      fh+='<button style="padding:6px 14px;border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;border:1px solid '+(on?'var(--grn)':'var(--cb)')+';background:'+(on?'var(--grn)':'transparent')+';color:'+(on?'#000':'var(--td)')+'" onclick="state.incCat=\''+cat.id+'\';render()">'+cat.name+'</button>';
    });
    fh+='</div>';
  }
  h+=card(fh,{border:isIncome?"var(--grn)":"var(--org)"});

  // Expense list
  if(mExp.length>0){
    var lh=hdr('📋','Logged ('+mExp.length+')','');
    mExp.forEach(function(ex){
      var isInc=ex.amt<0;
      var ci=flexCats.find(function(cat){return cat.id===ex.cat;});
      var ic=incomeCats.find(function(cat){return cat.id===ex.cat;});
      var catLabel=isInc?(ic?ic.name:'💸 Income'):(ci?ci.name:ex.cat);
      var amtColor=isInc?'var(--grn)':'var(--org)';
      var amtText=isInc?'+'+fd(Math.abs(ex.amt)):fd(ex.amt);
      lh+='<div class="row"><div><div style="font-size:13px">'+(ex.note||catLabel)+'</div><div style="font-size:10px;color:var(--tm)">'+catLabel+'</div></div><div style="display:flex;align-items:center;gap:10px"><span class="mono" style="font-size:14px;font-weight:600;color:'+amtColor+'">'+amtText+'</span><button class="btn-del" onclick="delExpense(\''+ex.id+'\')">x</button></div></div>';
    });
    h+=card(lh);
  }

  h+='</div>';
  c.innerHTML=h;
}

function renderPayoff(c) {
  var doneCnt=0,totPmts=0,totAll=0,totOwed=0;
  loans.forEach(function(l){
    var paid=getPaidCount(l.id,l.left);
    if(paid>=l.left)doneCnt++;
    totPmts+=paid;totAll+=l.left;
    totOwed+=Math.max(0,l.rem-paid*l.pmt);
  });
  var pctDone=Math.round(totPmts/totAll*100);
  var filtered=getFiltered();

  var h='<div class="stack">';
  h+=card('<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;text-align:center"><div><div style="font-size:10px;color:var(--td);text-transform:uppercase">Done</div><div class="mono" style="font-size:22px;font-weight:700;color:'+(doneCnt>0?'var(--hi)':'var(--tx)')+'">'+doneCnt+'/'+loans.length+'</div></div><div><div style="font-size:10px;color:var(--td);text-transform:uppercase">Pmts</div><div class="mono" style="font-size:22px;font-weight:700;color:var(--org)">'+totPmts+'/'+totAll+'</div></div><div><div style="font-size:10px;color:var(--td);text-transform:uppercase">Owed</div><div class="mono" style="font-size:22px;font-weight:700;color:var(--red)">'+fm(Math.max(0,totOwed))+'</div></div></div><div style="margin-top:12px">'+bar(totPmts,totAll,'var(--hi)',12)+'<div style="font-size:11px;color:var(--tm);margin-top:4px;text-align:center">'+pctDone+'% complete</div></div>',{glow:true});

  // Platform filter
  h+='<div style="display:flex;gap:6px;overflow-x:auto">';
  ["All","Affirm","Klarna","PayPal","AfterPay","GreenPath"].forEach(function(p){
    var on=state.platF===p;
    h+='<button class="pill'+(on?' on':'')+'" onclick="state.platF=\''+p+'\';render()">'+p+'</button>';
  });
  h+='</div>';

  // Sort
  h+='<div style="display:flex;gap:6px;overflow-x:auto">';
  [{k:"date",l:"📅 Due date"},{k:"ends",l:"🏁 Ending soon"},{k:"pmt",l:"💸 Biggest"},{k:"owed",l:"🎯 Least owed"}].forEach(function(s){
    var on=state.sortBy===s.k;
    h+='<button class="pill'+(on?' on-a':'')+'" onclick="state.sortBy=\''+s.k+'\';render()">'+s.l+'</button>';
  });
  h+='</div>';

  // Loan cards
  filtered.forEach(function(loan){
    var paid=getPaidCount(loan.id,loan.left);
    var done=paid>=loan.left;
    var leftAmt=Math.max(0,loan.rem-paid*loan.pmt);

    var lh='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px"><div><div style="font-size:14px;font-weight:600;color:'+(done?'var(--hi)':'var(--tx)')+';text-decoration:'+(done?'line-through':'none')+'">'+loan.name+'</div><div style="font-size:11px;color:var(--tm)">'+loan.p+' - '+fd(loan.pmt)+'/mo - '+loan.day+'th - ends '+loan.ends+'</div></div><div class="mono" style="font-size:14px;font-weight:700;color:'+(done?'var(--hi)':'var(--tx)')+'">'+(done?'DONE ✓':fm(leftAmt))+'</div></div>';
    lh+=bar(paid,loan.left,done?'var(--hi)':'var(--org)',6);
    lh+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px">';
    for(var i=1;i<=loan.left;i++){
      var isPaid=state.paidMap[loan.id+"-"+i];
      lh+='<button class="chk'+(isPaid?' on':'')+'" onclick="togglePaid(\''+loan.id+'\','+i+')">'+(isPaid?'✓':i)+'</button>';
    }
    lh+='</div>';
    if(loan.hasInt) lh+='<div style="font-size:10px;color:var(--yel);margin-top:6px">⚠ Accruing interest</div>';

    var extra=done?{bg:"rgba(34,197,94,.06)",border:"rgba(34,197,94,.3)"}:{};
    h+=card(lh,extra);
  });

  h+='</div>';
  c.innerHTML=h;
}

function renderPayday(c) {
  var h='<div class="stack">';
  [{n:"Paycheck 1",s:"1st of month",b:pay1,tot:p1t,t:"Covers half groceries, gas, surprise buffer."},{n:"Paycheck 2",s:"15th of month",b:pay2,tot:p2t,t:"Covers other half groceries, eating out, personal, cats."}].forEach(function(p){
    var ph=hdr('💰',p.n+' (~$2,249)',p.s);
    p.b.forEach(function(b){ph+='<div class="row"><span style="color:var(--td)">'+b.n+'</span><span class="mono" style="font-weight:600">'+fm(b.a)+'</span></div>';});
    ph+='<div style="display:flex;justify-content:space-between;padding:12px 0 4px;font-weight:700"><span>Bills</span><span class="mono" style="color:var(--red)">'+fm(p.tot)+'</span></div>';
    ph+='<div style="display:flex;justify-content:space-between;padding:4px 0"><span style="color:var(--td)">Left</span><span class="mono" style="color:var(--hi);font-weight:700">'+fm(2249-p.tot)+'</span></div>';
    ph+=tip(p.t);
    h+=card(ph);
  });

  var th=hdr('💰','Monthly $1,000 Transfer','Split immediately');
  th+='<div style="display:flex;gap:12px;margin-top:8px"><div style="flex:1;padding:16px;background:rgba(142,197,224,.08);border-radius:12px;text-align:center"><div style="font-size:11px;color:var(--td)">MOVE FUND</div><div class="mono" style="font-size:24px;font-weight:700;color:var(--grn)">$650</div><div style="font-size:10px;color:var(--hi)">Savings</div></div><div style="flex:1;padding:16px;background:rgba(103,184,212,.08);border-radius:12px;text-align:center"><div style="font-size:11px;color:var(--td)">BUFFER</div><div class="mono" style="font-size:24px;font-weight:700;color:var(--a)">$300</div><div style="font-size:10px;color:var(--al)">Checking</div></div></div>';
  h+=card(th);

  h+='</div>';
  c.innerHTML=h;
}

function renderMove(c) {
  var h='<div class="stack">';
  var mh=hdr('🏡','SC Move Fund','Goal: $2,600 by August 31 — $650/mo');
  mh+='<div style="margin:20px 0">'+bar(state.moveSaved,2800,'var(--hi)',16)+'<div style="display:flex;justify-content:space-between;margin-top:6px"><span style="font-size:12px;color:var(--tm)">'+fm(state.moveSaved)+'</span><span style="font-size:12px;color:var(--tm)">'+fm(2800)+'</span></div></div>';
  mh+='<div style="display:flex;gap:8px;flex-wrap:wrap">';
  [0,650,1300,1950,2600,2800].forEach(function(v){
    var on=state.moveSaved===v;
    mh+='<button style="padding:6px 14px;border-radius:20px;border:1px solid '+(on?'var(--org)':'var(--cb)')+';background:'+(on?'var(--org)':'transparent')+';color:'+(on?'#000':'var(--td)')+';font-size:12px;font-weight:600;cursor:pointer;font-family:inherit" onclick="setMoveSaved('+v+')">'+(v===0?'Start':fm(v))+'</button>';
  });
  mh+='</div>';
  h+=card(mh,{glow:true});

  var tlh=hdr('📅','Timeline','');
  [{m:"May",c:650,n:"Set up system"},{m:"Jun",c:1300,n:"Halfway"},{m:"Jul",c:1950,n:"Plan logistics"},{m:"Aug",c:2600,n:"Move!"}].forEach(function(x){
    var done=state.moveSaved>=x.c;
    tlh+='<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--cb)"><div style="width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:'+(done?'var(--hi)':'rgba(249,115,22,.1)')+';color:'+(done?'#000':'var(--org)')+';font-size:12px;font-weight:700">'+(done?'✓':x.m)+'</div><div><div style="font-size:14px;font-weight:600">'+x.m+' - '+fm(x.c)+'</div><div style="font-size:11px;color:var(--tm)">'+x.n+'</div></div></div>';
  });
  h+=card(tlh);

  h+=card(hdr('⭐','After the Move','')+'<div style="font-size:13px;color:var(--td);line-height:1.7">Half of Vinnys $1,750: <strong style="color:var(--grn)">$875/mo</strong> vs $1,363 now = <strong style="color:var(--grn)">$488/mo freed up</strong>.</div>');

  h+='</div>';
  c.innerHTML=h;
}

function renderBills(c) {
  var h='<div class="stack">';
  var ft=0;fixedBills.forEach(function(b){ft+=b.a;});
  var bh=hdr('📌','Fixed Bills',fm(ft)+'/mo');
  fixedBills.forEach(function(b){bh+='<div class="row"><span>'+b.n+'</span><span class="mono" style="font-weight:600">'+fm(b.a)+'</span></div>';});
  h+=card(bh);

  var st=0;subsList.forEach(function(b){st+=b.a;});
  var sh=hdr('🔄','Subscriptions',fm(st)+'/mo');
  subsList.forEach(function(b){sh+='<div class="row"><span>'+b.n+'</span><span class="mono" style="font-weight:600;color:var(--td)">'+fm(b.a)+'</span></div>';});
  sh+=tip('Hulu + Paramount+ + YouTube TV = $107/mo. Could you pause one?');
  h+=card(sh);

  h+='</div>';
  c.innerHTML=h;
}

// =====================================================
// ACTIONS
// =====================================================
function addExpense() {
  var a = parseFloat(state.expAmt);
  if (!a || a <= 0) return;
  var isIncome = state.expType === "income";
  var id = String(Date.now());
  var finalAmt = isIncome ? -a : a;
  var cat = isIncome ? state.incCat : state.expCat;
  var exp = {id:id, amt:finalAmt, note:state.expNote||"", cat:cat, month:state.sMonth};
  state.expenses.push(exp);
  state.expAmt = "";
  state.expNote = "";
  render();
  api({action:"saveExpense",id:id,amount:finalAmt,note:exp.note,category:cat,month:exp.month}, function(){setSyncStatus("ok");});
}

function delExpense(id) {
  state.expenses = state.expenses.filter(function(e){return e.id !== id;});
  render();
  api({action:"deleteExpense",id:id}, function(){setSyncStatus("ok");});
}

function togglePaid(loanId, month) {
  var key = loanId+"-"+month;
  var newVal = !state.paidMap[key];
  state.paidMap[key] = newVal;
  render();
  api({action:"togglePaid",key:key,value:String(newVal)}, function(){setSyncStatus("ok");});
}

function setMoveSaved(v) {
  state.moveSaved = v;
  render();
  api({action:"setMoveSaved",value:v}, function(){setSyncStatus("ok");});
}

// =====================================================
// INIT
// =====================================================
function init() {
  setSyncStatus("load");
  if (SCRIPT_URL === "YOUR_APPS_SCRIPT_URL_HERE") {
    // No backend configured, run locally
    state.loaded = true;
    render();
    return;
  }
  api({action:"load"}, function(data) {
    if (data && !data.error) {
      state.expenses = data.expenses || [];
      state.paidMap = data.paidMap || {};
      state.moveSaved = data.moveSaved || 0;
    }
    state.loaded = true;
    setSyncStatus("ok");
    render();
  });
}

init();
</script>
